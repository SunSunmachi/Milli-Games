<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>クリッカーヒーロー - Milli Games</title>
  <style>
    /* ===== このファイル1つで完結しています ===== */

    /* ===== CSS変数 ===== */
    :root {
      --bg-1: #1a0a30;
      --bg-2: #3d1f6e;
      --bg-3: #5a2d8a;
      --primary: #a855f7;
      --primary-dark: #7c3aed;
      --primary-light: #d8b4fe;
      --glass-bg: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.18);
      --glass-blur: 20px;
      --text: #ffffff;
      --text-secondary: rgba(255,255,255,0.78);
      --text-muted: rgba(255,255,255,0.45);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== リセット ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ===== ヘッダー ===== */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: var(--transition);
    }
    header a:hover { color: var(--text); }
    header span {
      font-weight: 700;
      font-size: 0.95rem;
    }

    /* ===== メイン ===== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 24px;
    }

    /* ===== ゲームUI ===== */
    #game-ui {
      display: flex;
      gap: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 16px 32px;
      width: 100%;
      max-width: 400px;
      justify-content: center;
    }
    .stat {
      text-align: center;
    }
    .stat-label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-value {
      display: block;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }
    #combo-value.combo-active {
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251,191,36,0.5);
    }

    /* ===== クリックボタン ===== */
    #click-btn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid var(--glass-border);
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
      box-shadow: 0 8px 40px rgba(168,85,247,0.4), inset 0 2px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s ease, box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    #click-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }
    #click-btn:active {
      transform: scale(0.92);
    }
    #click-btn .label-small {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* ===== スタートボタン ===== */
    #start-btn {
      padding: 14px 48px;
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      transition: var(--transition);
      box-shadow: 0 4px 20px rgba(168,85,247,0.3);
    }
    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(168,85,247,0.5);
    }
    #start-btn:active { transform: translateY(0); }

    /* ===== 結果画面 ===== */
    #result {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 32px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 340px;
      width: 100%;
    }
    #result.hidden { display: none; }
    #result h2 {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    #result .result-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary-light);
    }
    #result .result-label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    #result .result-combo {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    #result .result-combo span { color: #fbbf24; font-weight: 700; }

    #play-again-btn {
      margin-top: 8px;
      padding: 12px 32px;
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(168,85,247,0.3);
    }
    #play-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(168,85,247,0.5);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ヘッダー：戻るリンク -->
  <header>
    <a href="../index.html">&larr; Milli Games に戻る</a>
    <span>クリッカーヒーロー</span>
  </header>

  <!-- メインゲームエリア -->
  <main>
    <!-- スコア・時間・コンボ表示 -->
    <div id="game-ui">
      <div class="stat">
        <span class="stat-label">スコア</span>
        <span id="score-value" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">残り時間</span>
        <span id="timer-value" class="stat-value">10</span>
      </div>
      <div class="stat">
        <span class="stat-label">コンボ</span>
        <span id="combo-value" class="stat-value">x1</span>
      </div>
    </div>

    <!-- クリックボタン -->
    <button id="click-btn" class="hidden">
      タップ！
      <span class="label-small">連打しろ！</span>
    </button>

    <!-- スタートボタン -->
    <button id="start-btn">ゲームスタート</button>

    <!-- 結果画面 -->
    <div id="result" class="hidden">
      <h2>結果</h2>
      <p class="result-label">最終スコア</p>
      <p class="result-score" id="final-score">0</p>
      <p class="result-combo">最大コンボ: <span id="max-combo">x1</span></p>
      <button id="play-again-btn">もう一度遊ぶ</button>
    </div>
  </main>

  <script>
    // ============================================
    // ゲーム「クリッカーヒーロー」
    // このファイルだけで動きます
    // ============================================
    "use strict";

    // ============================================
    // 1. 音量をメインページから取得
    // ============================================
    function getVolume() {
      var saved = localStorage.getItem("milli-volume");
      return saved !== null ? parseInt(saved) / 100 : 0.8;
    }

    // ============================================
    // 2. 効果音（Web Audio API）
    // ============================================
    var audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // ビープ音
    function playBeep(freq, duration, vol) {
      try {
        initAudio();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        var volume = (vol || 0.2) * getVolume();
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    // 各種効果音
    var SOUNDS = {
      click: function () { playBeep(660, 0.05, 0.12); },
      combo: function (level) { playBeep(800 + level * 100, 0.1, 0.18); },
      countdown: function () { playBeep(440, 0.08, 0.1); },
      finish: function () {
        try {
          initAudio();
          var notes = [523, 659, 784, 1047];
          for (var i = 0; i < notes.length; i++) {
            (function (f, t) {
              var osc = audioCtx.createOscillator();
              var gain = audioCtx.createGain();
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.frequency.value = f;
              gain.gain.setValueAtTime(0.2 * getVolume(), audioCtx.currentTime + t);
              gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.12);
              osc.start(audioCtx.currentTime + t);
              osc.stop(audioCtx.currentTime + t + 0.12);
            })(notes[i], i * 0.1);
          }
        } catch (e) {}
      }
    };

    // ============================================
    // 3. DOM参照
    // ============================================
    var scoreEl = document.getElementById("score-value");
    var timerEl = document.getElementById("timer-value");
    var comboEl = document.getElementById("combo-value");
    var clickBtn = document.getElementById("click-btn");
    var startBtn = document.getElementById("start-btn");
    var resultScreen = document.getElementById("result");
    var finalScoreEl = document.getElementById("final-score");
    var maxComboEl = document.getElementById("max-combo");
    var playAgainBtn = document.getElementById("play-again-btn");

    // ============================================
    // 4. ゲームの状態
    // ============================================
    var game = {
      score: 0,
      timeLeft: 10,
      combo: 1,
      maxCombo: 1,
      lastClickTime: 0,
      isPlaying: false,
      isGameOver: false,
      timerInterval: null
    };

    // ============================================
    // 5. UI更新
    // ============================================
    function updateUI() {
      scoreEl.textContent = game.score;
      timerEl.textContent = game.timeLeft;
      comboEl.textContent = "x" + game.combo;
      if (game.combo >= 3) {
        comboEl.classList.add("combo-active");
      } else {
        comboEl.classList.remove("combo-active");
      }
    }

    // ============================================
    // 6. クリック処理
    // ============================================
    function handleClick() {
      if (!game.isPlaying || game.isGameOver) return;

      var now = Date.now();
      var timeSinceLast = now - game.lastClickTime;

      // コンボ判定（0.5秒以内ならコンボ継続）
      if (timeSinceLast < 500 && timeSinceLast > 0) {
        game.combo = Math.min(game.combo + 1, 5);
        if (game.combo > game.maxCombo) {
          game.maxCombo = game.combo;
        }
        if (game.combo >= 2) {
          SOUNDS.combo(game.combo);
        }
      } else {
        game.combo = 1;
      }

      game.lastClickTime = now;
      game.score += game.combo;
      SOUNDS.click();
      updateUI();

      // 押したときのアニメーション
      clickBtn.style.transform = "scale(0.92)";
      setTimeout(function () {
        clickBtn.style.transform = "";
      }, 80);
    }

    // ============================================
    // 7. ゲーム開始
    // ============================================
    function startGame() {
      game.score = 0;
      game.timeLeft = 10;
      game.combo = 1;
      game.maxCombo = 1;
      game.lastClickTime = 0;
      game.isPlaying = true;
      game.isGameOver = false;

      startBtn.classList.add("hidden");
      resultScreen.classList.add("hidden");
      clickBtn.classList.remove("hidden");

      updateUI();

      // カウントダウンタイマー
      game.timerInterval = setInterval(function () {
        game.timeLeft--;
        updateUI();

        if (game.timeLeft <= 3 && game.timeLeft > 0) {
          SOUNDS.countdown();
        }

        if (game.timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    // ============================================
    // 8. ゲーム終了
    // ============================================
    function endGame() {
      game.isPlaying = false;
      game.isGameOver = true;
      clearInterval(game.timerInterval);
      game.timerInterval = null;

      finalScoreEl.textContent = game.score;
      maxComboEl.textContent = "x" + game.maxCombo;
      resultScreen.classList.remove("hidden");
      clickBtn.classList.add("hidden");
      startBtn.classList.remove("hidden");

      SOUNDS.finish();
    }

    // ============================================
    // 9. イベント登録
    // ============================================
    clickBtn.addEventListener("click", handleClick);
    clickBtn.addEventListener("touchstart", function (e) {
      e.preventDefault();
      handleClick();
    });

    startBtn.addEventListener("click", startGame);
    playAgainBtn.addEventListener("click", startGame);

    // キーボードでもクリック可能に
    document.addEventListener("keydown", function (e) {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        if (game.isPlaying && !game.isGameOver) {
          handleClick();
        } else if (!game.isPlaying && !game.isGameOver) {
          startGame();
        }
      }
    });
  </script>
</body>
</html>
